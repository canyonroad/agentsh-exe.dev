# agentsh server configuration for exe.dev VM
# Extends default config with settings optimized for exe.dev environment

server:
  http:
    addr: "127.0.0.1:18080"
    read_timeout: "30s"
    write_timeout: "60s"
    max_request_size: "10MB"
  grpc:
    enabled: true
    addr: "127.0.0.1:9090"

auth:
  type: "none"

logging:
  level: "info"
  format: "text"
  output: "stderr"

sessions:
  base_dir: "/var/lib/agentsh/sessions"
  max_sessions: 100
  default_timeout: "1h"
  default_idle_timeout: "15m"
  cleanup_interval: "5m"

audit:
  enabled: true
  storage:
    sqlite_path: "/var/lib/agentsh/events.db"

sandbox:
  enabled: true
  allow_degraded: false  # exe.dev has full capability — don't degrade

  limits:
    max_memory_mb: 4096
    max_cpu_percent: 100
    max_processes: 256

  # FUSE filesystem for file operation interception
  # Detected as available in exe.dev
  fuse:
    enabled: true
    deferred: true
    deferred_marker_file: "/tmp/.agentsh-fuse-enabled"
    deferred_enable_command: ["/bin/chmod", "666", "/dev/fuse"]
    audit:
      mode: "soft_delete"

  network:
    enabled: true
    intercept_mode: "all"
    proxy_listen_addr: "127.0.0.1:0"

  # Cgroups v2 detected as available in exe.dev
  cgroups:
    enabled: true

  # Seccomp - per-command wrapper via agentsh-unixwrap
  seccomp:
    enabled: true
    execve:
      enabled: false   # ptrace handles execve; MUST remain false (validated)
    # File I/O interception via seccomp — enforces file_rules at syscall level
    file_monitor:
      enabled: true
      enforce_without_fuse: true

  # Ptrace - execve-only interception (hybrid mode with seccomp wrapper)
  # Catches child process execve() calls (env sudo, xargs sudo, python subprocess, etc.)
  # that bypass the API-level command precheck.
  ptrace:
    enabled: true
    trace:
      execve: true
      file: false      # seccomp wrapper handles file monitoring
      network: false   # seccomp wrapper handles network monitoring
      signal: false    # seccomp wrapper handles signal filtering
    performance:
      seccomp_prefilter: true

  # Unix socket wrapper - seccomp-based unix socket interception
  unix_sockets:
    enabled: true

# Landlock - kernel-level filesystem restriction (v5 on exe.dev)
# Derives write-allowed paths from policy (workspace + /tmp only),
# blocking writes to /etc, /usr/bin, etc. even for root.
landlock:
  enabled: true
  allow_execute:
    - /usr/bin
    - /usr/sbin
    - /usr/local/bin
    - /bin
    - /sbin
    - /usr/lib
    - /lib
    - /lib64
  allow_read:
    - /usr
    - /lib
    - /lib64
    - /bin
    - /sbin
    - /etc
    - /proc
    - /sys
    - /dev
    - /tmp
    - /var
    - /root
  allow_write:
    - /root
    - /workspace
    - /tmp
    - /var/tmp
    - /var/lib/agentsh

# Security mode - full (exe.dev VMs support ptrace, seccomp, landlock, fuse)
security:
  mode: full
  strict: false

# Capabilities as recommended by agentsh detect
capabilities:
  allow: []

proxy:
  mode: "embedded"
  port: 0
  providers:
    anthropic: "https://api.anthropic.com"
    openai: "https://api.openai.com"

dlp:
  mode: "redact"
  patterns:
    email: true
    phone: true
    credit_card: true
    ssn: true
    api_keys: true
  custom_patterns:
    - name: openai_key
      display: OPENAI_KEY
      regex: "sk-[a-zA-Z0-9]{48,}"
    - name: anthropic_key
      display: ANTHROPIC_KEY
      regex: "sk-ant-[a-zA-Z0-9-]{95,}"
    - name: aws_access_key
      display: AWS_KEY
      regex: "AKIA[0-9A-Z]{16}"
    - name: github_pat
      display: GITHUB_TOKEN
      regex: "ghp_[a-zA-Z0-9]{36}"
    - name: github_oauth
      display: GITHUB_OAUTH
      regex: "gho_[a-zA-Z0-9]{36}"
    - name: jwt_token
      display: JWT
      regex: "eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*"
    - name: private_key
      display: PRIVATE_KEY
      regex: "-----BEGIN [A-Z]+ PRIVATE KEY-----"
    - name: slack_token
      display: SLACK_TOKEN
      regex: "xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}"

policies:
  dir: "/etc/agentsh/policies"
  default_policy: "default"
  # env_shim_path intentionally omitted — the statically-linked shell shim
  # cannot be used as an LD_PRELOAD library. Env iteration blocking handled
  # by policy env_policy.block_iteration instead.

approvals:
  enabled: false
  mode: "async"
  timeout: "5m"

metrics:
  enabled: true
  path: "/metrics"

health:
  path: "/health"
  readiness_path: "/ready"

development:
  disable_auth: true
  verbose_errors: true
